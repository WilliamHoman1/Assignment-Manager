    <!-- Home page creation -->
<!DOCTYPE html>
<html>
<head>
    <title>Assignment Manager</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
        }
        h1 {
            color: #333;
        }
        .card {
            border: 1px solid #ccc;
            padding: 15px;
            margin-top: 10px;
            border-radius: 5px;
        }
        a {
            text-decoration: none;
            color: #0066cc;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Assignment Manager</h1>
    <p>Professor dashboard</p>

    <div class="card">
        <h3>View Assignments</h3>
        <p><a href="/assignments">Go to assignments</a></p>
    </div>

    <div class="card">
        <h3>View Problems</h3>
        <p><a href="/problems">Go to problems</a></p>
    </div>

    <div class="card">
        <h3>Create Assignment</h3>
        <form action="/create" method="post">
            <input name="title" placeholder="Assignment Title" required>
            <button type="submit">Create</button>
        </form>
    </div>
</div>
</body>
</html>
