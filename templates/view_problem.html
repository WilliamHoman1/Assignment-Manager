<!DOCTYPE html>
<html>
<head>
    <title>{{ problem.title }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f4f4f4;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.08);
        }

        .meta {
            margin-bottom: 15px;
            color: #666;
        }

        pre {
            background-color: #1e1e1e;
            color: #f8f8f2;
            padding: 20px;
            overflow-x: auto;
            border-radius: 6px;
        }

        code {
            font-family: Consolas, monospace;
            font-size: 14px;
        }

        .back-link {
            margin-top: 20px;
            display: block;
        }
    </style>
</head>

<body>
<div class="container">

    <h1>{{ problem.title }}</h1>

    <div class="meta">
        Topic: {{ problem.topic }} |
        Difficulty: {{ problem.difficulty|capitalize }} |
        Language: {{ problem.language }}
    </div>

    <h3>Problem Code</h3>

    <pre><code>{{ problem.instructions }}</code></pre>

    <a href="/problems" class="back-link">← Back to Problems</a>

</div>
</body>
</html>
