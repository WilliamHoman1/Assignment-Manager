<!DOCTYPE html>
<html>
<head>
    <title>Available Problems</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f5f5f5;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.08);
        }

        h1 {
            margin-bottom: 25px;
        }

        .problem-card {
            border: 1px solid #e0e0e0;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            background-color: #fafafa;
        }

        .problem-card h3 {
            margin: 0 0 10px 0;
        }

        .meta {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .difficulty-easy { color: green; font-weight: bold; }
        .difficulty-medium { color: orange; font-weight: bold; }
        .difficulty-hard { color: red; font-weight: bold; }

        .preview {
            margin-top: 10px;
            font-size: 14px;
            color: #444;
        }

        .actions {
            margin-top: 10px;
        }

        .btn {
            padding: 6px 10px;
            background-color: #0066cc;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 13px;
        }

        .btn:hover {
            background-color: #004999;
        }

        select, input, button {
            padding: 8px;
            margin-top: 10px;
        }

        form {
            margin-top: 30px;
        }

        .back-link {
            margin-top: 30px;
            display: block;
        }
    </style>
</head>
<body>
<div class="container">

    <h1>Available Problems</h1>

    {% for p in problems %}
        <div class="problem-card">

            <h3>{{ p.title }}</h3>

            <div class="meta">
                Topic: {{ p.topic }} |
                Language: {{ p.language }} |
                Difficulty:
                <span class="difficulty-{{ p.difficulty }}">
                    {{ p.difficulty|capitalize }}
                </span>
            </div>

            <div class="preview">
                {{ p.preview }}
            </div>

            <div class="actions">
                <a href="/problem/{{ p.id }}" class="btn">View Full Problem</a>
            </div>

        </div>
    {% else %}
        <p>No problems found.</p>
    {% endfor %}

    <h3>Link Problem to Assignment</h3>

    <form action="/link" method="post">
        <input name="assignment_id" type="number" placeholder="Assignment ID" required>

        <select name="problem_id" required>
            <option value="">Select a Problem</option>
            {% for p in problems %}
                <option value="{{ p.id }}">
                    {{ p.title }}
                </option>
            {% endfor %}
        </select>

        <button type="submit">Link Problem</button>
    </form>

    <a href="/" class="back-link">← Back to Home</a>

</div>
</body>
</html>
